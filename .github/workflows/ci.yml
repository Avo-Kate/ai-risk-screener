name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ai_risk
          POSTGRES_PASSWORD: ai_risk
          POSTGRES_DB: ai_risk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ai_risk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      # Linux gets current cryptography wheels; the constraints-local.txt pin
      # is for Intel-mac dev machines only (see that file).
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      # The suite defaults to in-memory SQLite; TEST_DATABASE_URL points it at
      # the service container so CI exercises the real database engine.
      - name: Tests (pytest, against Postgres)
        run: python -m pytest
        env:
          TEST_DATABASE_URL: postgresql+psycopg://ai_risk:ai_risk@localhost:5432/ai_risk_test

  frontend:
    name: Frontend (eslint + prettier + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Format check (prettier)
        run: npm run format:check

      - name: Build
        run: npm run build
