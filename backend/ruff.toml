# Ruff — linter + formatter for the backend. Run from backend/:
#   .venv/bin/ruff check .          # lint (add --fix to auto-fix)
#   .venv/bin/ruff format .         # format
#   .venv/bin/ruff format --check . # verify formatting without writing

# README promises Python 3.10+, so don't allow 3.11-only syntax even though
# the local venv is 3.11.
target-version = "py310"

[lint]
# Defaults (E4/E7/E9, F) plus: full pycodestyle (E), import sorting (I),
# modern-syntax upgrades (UP), and bugbear's likely-bug patterns (B).
select = ["E", "F", "I", "UP", "B"]
# The formatter owns line length. What E501 would still flag is long literal
# strings (the seed example, SYSTEM_PROMPT — which must never be rewrapped:
# any edit to it invalidates the Anthropic prompt cache, see CLAUDE.md).
ignore = ["E501"]

[lint.flake8-bugbear]
# FastAPI's dependency-injection idiom puts calls in parameter defaults on
# purpose (Depends(get_db), Header(...), Query(...)); don't flag it as B008.
extend-immutable-calls = ["fastapi.Depends", "fastapi.Header", "fastapi.Query"]

[lint.per-file-ignores]
# Alembic migrations are autogenerated; don't hold them to import-order rules.
"alembic/versions/*" = ["I"]
# conftest must set env vars before importing app modules (documented there).
"tests/conftest.py" = ["E402"]
